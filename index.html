<!DOCTYPE html>
<html>
<head>
<title>Login Test</title>
<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:30px;
    border-radius:8px;
    width:300px;
    text-align:center;
}

input{
    width:90%;
    padding:10px;
    margin:10px 0;
}

button{
    padding:10px 20px;
    cursor:pointer;
}

#msg{
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input type="text" placeholder="Username"><br>

<input type="password" id="pass" placeholder="Password"><br>

<button onclick="checkPass()">Login</button>

<div id="msg"></div>
</div>

<script>
function checkPass(){

    let pass = document.getElementById("pass").value;

    let number = /[0-9]/;
    let symbol = /[!@#$%^&*(),.?":{}|<>]/;

    if(pass.length < 8){
        msg("Password must be 8+ characters","red");
    }
    else if(!number.test(pass)){
        msg("Password must contain a number","red");
    }
    else if(!symbol.test(pass)){
        msg("Password must contain a symbol","red");
    }
    else{
        msg("Password format valid","green");
    }
}

function msg(text,color){
    let m = document.getElementById("msg");
    m.innerText = text;
    m.style.color = color;
}
</script>

</body>
</html>
